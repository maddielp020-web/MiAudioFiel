<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MiAudioFiel · TTS Premium</title>

<!-- PWA Icons -->
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,...">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1428">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ================= LIQUID GLASS SYSTEM (iOS 26) ================= */
* {
  margin: 0; padding: 0; 
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --glass-bg: rgba(20, 35, 60, 0.4);
  --glass-border: rgba(255, 255, 255, 0.15);
  --glass-glow: rgba(74, 128, 255, 0.3);
  --glass-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.6);
  --primary-blue: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
  --gold-accent: #facc15;
}

body {
  font-family: 'SF Pro Display', -apple-system, sans-serif;
  background: radial-gradient(ellipse at top, #0a1428 0%, #1a233f 50%, #0f172a 100%);
  color: #f8fafc;
  min-height: 100vh;
  padding: 20px;
  overflow-x: hidden;
  position: relative;
}

/* Fondo animado Liquid Glass */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(250, 204, 21, 0.1) 0%, transparent 50%),
    radial-gradient(circle at 40% 40%, rgba(20, 35, 60, 0.4) 0%, transparent 70%);
  animation: glassFlow 20s ease-in-out infinite;
  z-index: -1;
}

@keyframes glassFlow {
  0%, 100% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(1deg) scale(1.05); }
}

/* ================= CONTAINER PRINCIPAL ================= */
.container {
  max-width: 420px;
  margin: 0 auto;
  position: relative;
  z-index: 10;
}

/* ================= CABECERA ================= */
.header {
  text-align: center;
  margin-bottom: 32px;
  padding: 20px 0;
}

.logo {
  font-size: clamp(2rem, 6vw, 2.8rem);
  font-weight: 700;
  background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 50%, #3b82f6 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 8px;
  text-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
}

.subtitle {
  color: rgba(236, 245, 255, 0.8);
  font-size: 1.05rem;
  font-weight: 400;
  margin-bottom: 12px;
}

.plan-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: rgba(20, 35, 60, 0.6);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 50px;
  font-size: 0.9rem;
  font-weight: 500;
  color: #e2e8f0;
  box-shadow: var(--glass-shadow);
}

/* ================= LIQUID GLASS CARDS ================= */
.liquid-card {
  background: rgba(20, 35, 60, 0.5);
  backdrop-filter: blur(25px) saturate(1.2);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 28px;
  padding: 32px 24px;
  margin-bottom: 24px;
  box-shadow: 
    0 32px 80px -20px rgba(0, 0, 0, 0.6),
    inset 0 1px 0 rgba(255, 255, 255, 0.1);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.liquid-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
}

.liquid-card:hover {
  transform: translateY(-8px);
  box-shadow: 
    0 48px 100px -25px rgba(0, 0, 0, 0.7),
    inset 0 1px 0 rgba(255, 255, 255, 0.15);
}

.liquid-card:hover::before {
  opacity: 1;
}

/* ================= TEXTAREA LIQUID ================= */
.textarea-liquid {
  width: 100%;
  min-height: 200px;
  max-height: 300px;
  background: rgba(10, 20, 45, 0.7);
  backdrop-filter: blur(20px);
  border: 2px solid rgba(255, 255, 255, 0.06);
  border-radius: 24px;
  color: #f8fafc;
  font-size: 16px;
  font-family: inherit;
  line-height: 1.6;
  padding: 20px;
  resize: vertical;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.4);
}

.textarea-liquid:focus {
  outline: none;
  border-color: rgba(59, 130, 246, 0.6);
  box-shadow: 
    inset 0 4px 20px rgba(0, 0, 0, 0.4),
    0 0 0 4px rgba(59, 130, 246, 0.2),
    var(--glass-glow);
  transform: scale(1.02);
}

.textarea-liquid::placeholder {
  color: rgba(162, 184, 251, 0.6);
}

/* ================= CHAR COUNTER ================= */
.char-counter {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 16px 0 24px;
  padding: 12px 20px;
  background: rgba(15, 25, 50, 0.6);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  font-size: 0.95rem;
  color: rgba(236, 245, 255, 0.9);
}

.char-limit {
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(74, 128, 255, 0.15));
  border: 1px solid rgba(59, 130, 246, 0.3);
}

/* ================= LIQUID GLASS BUTTONS ================= */
.btn-liquid {
  flex: 1;
  padding: 20px 16px;
  border: none;
  border-radius: 24px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  font-family: inherit;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
  min-height: 68px;
}

.btn-liquid::before {
  content: '';
  position: absolute;
  inset: 0;
  background: inherit;
  border-radius: inherit;
  opacity: 0.7;
  z-index: -1;
}

.btn-liquid-primary {
  background: rgba(30, 64, 175, 0.9);
  border: 2px solid rgba(59, 130, 246, 0.4);
  color: #ffffff;
  box-shadow: 
    0 16px 40px rgba(59, 130, 246, 0.3),
    inset 0 1px 0 rgba(255, 255, 255, 0.2);
}

.btn-liquid-primary:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 
    0 24px 60px rgba(59, 130, 246, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.3);
}

.btn-liquid-secondary {
  background: rgba(45, 55, 75, 0.8);
  border: 2px solid rgba(255, 255, 255, 0.15);
  color: #e2e8f0;
}

.btn-liquid:disabled {
  opacity: 0.4;
  transform: none !important;
  cursor: not-allowed;
}

/* ================= CONTROLS PANEL ================= */
.controls-liquid {
  background: rgba(15, 25, 50, 0.5);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  padding: 24px;
  margin-bottom: 20px;
}

.select-liquid {
  width: 100%;
  padding: 16px 20px;
  background: rgba(10, 20, 45, 0.8);
  backdrop-filter: blur(15px);
  border: 2px solid rgba(255, 255, 255, 0.08);
  border-radius: 20px;
  color: #f8fafc;
  font-size: 1rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s ease;
}

.select-liquid:focus {
  outline: none;
  border-color: rgba(59, 130, 246, 0.5);
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
}

/* ================= STATUS BAR ================= */
.status-liquid {
  padding: 20px;
  background: rgba(15, 25, 50, 0.7);
  backdrop-filter: blur(20px);
  border: 2px solid rgba(59, 130, 246, 0.3);
  border-radius: 24px;
  text-align: center;
  font-weight: 500;
  font-size: 1.1rem;
  transition: all 0.4s ease;
  box-shadow: var(--glass-shadow);
}

.status-playing {
  border-color: rgba(250, 204, 21, 0.6);
  background: rgba(250, 204, 21, 0.1);
  box-shadow: 0 0 40px rgba(250, 204, 21, 0.3);
}

/* ================= RESPONSIVE ================= */
@media (max-width: 480px) {
  .container { padding: 16px; }
  .liquid-card { padding: 24px 20px; margin-bottom: 20px; }
  .btn-liquid { padding: 18px 12px; font-size: 1rem; }
}

/* ================= ANIMACIONES ================= */
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-5px); }
}
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="logo">MiAudioFiel</div>
    <div class="subtitle">Texto a Voz Premium</div>
    <div class="plan-badge" id="planBadge">
      <i class="fas fa-crown"></i>
      <span>PLAN GRATIS</span>
      <span id="charsLeft">2,500 / día</span>
    </div>
  </div>

  <!-- Text Input Card -->
  <div class="liquid-card">
    <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 20px;">
      <i class="fas fa-microphone" style="color: #3b82f6; font-size: 1.4rem;"></i>
      <h2 style="font-size: 1.3rem; font-weight: 600; color: #e2e8f0;">Texto a narrar</h2>
    </div>
    
    <textarea 
      class="textarea-liquid" 
      id="textInput" 
      placeholder="Escribe o pega tu texto aquí... Máximo 2.500 caracteres (GRATIS)"
    ></textarea>
    
    <div class="char-counter">
      <span><i class="fas fa-hashtag"></i> <span id="charCount">0</span> caracteres</span>
      <div class="char-limit" id="charLimit">2,500 / día</div>
    </div>
  </div>

  <!-- Controls Card -->
  <div class="liquid-card controls-liquid">
    <div style="margin-bottom: 24px;">
      <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 12px;">
        <i class="fas fa-sliders-h" style="color: #3b82f6;"></i>
        <label style="font-weight: 500; color: #e2e8f0;">Configuración Premium</label>
      </div>
      
      <div style="display: grid; gap: 16px;">
        <div>
          <label style="display: block; margin-bottom: 8px; color: #a0b8d4;">Voz</label>
          <select class="select-liquid" id="voiceSelect">
            <option value="es-ES-ElviraNeural">🇪🇸 Elvira (Español España)</option>
            <option value="es-ES-AlvaroNeural">🇪🇸 Álvaro (Español Hombre)</option>
            <option value="es-MX-PaulinaNeural">🇲🇽 Paulina (Español México)</option>
            <option value="en-US-AriaNeural">🇺🇸 Aria (Inglés)</option>
            <option value="ru-RU-SvetlanaNeural">🇷🇺 Svetlana (Ruso)</option>
          </select>
        </div>
        
        <div>
          <label style="display: block; margin-bottom: 8px; color: #a0b8d4;">Velocidad</label>
          <div style="display: flex; gap: 12px;">
            <label><input type="radio" name="speed" value="0" checked> Normal</label>
            <label><input type="radio" name="speed" value="-20%"> Lento</label>
            <label><input type="radio" name="speed" value="20%"> Rápido</label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Buttons -->
  <div style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px;">
    <button class="btn-liquid btn-liquid-primary" id="playBtn">
      <i class="fas fa-play"></i> GENERAR AUDIO
    </button>
    <div style="display: flex; gap: 16px;">
      <button class="btn-liquid btn-liquid-secondary" id="tokenBtn">
        <i class="fas fa-key"></i> TOKEN PRO
      </button>
      <button class="btn-liquid btn-liquid-secondary" id="upgradeBtn">
        <i class="fas fa-crown"></i> IR PRO
      </button>
    </div>
  </div>

  <!-- Status -->
  <div class="status-liquid" id="status">
    <i class="fas fa-circle-notch fa-spin"></i> Listo para generar audio premium
  </div>

  <!-- Audio Player -->
  <div class="liquid-card" id="audioPlayer" style="display: none;">
    <audio id="audioPlayerEl" controls style="width: 100%; margin-top: 16px;"></audio>
    <div style="text-align: center; margin-top: 12px;">
      <button class="btn-liquid btn-liquid-secondary" id="downloadBtn" style="width: 100%;">
        <i class="fas fa-download"></i> DESCARGAR MP3
      </button>
    </div>
  </div>
</div>

<script>
// ================= LOGICA MiAudioFiel PRO =================
const textInput = document.getElementById('textInput');
const voiceSelect = document.getElementById('voiceSelect');
const playBtn = document.getElementById('playBtn');
const status = document.getElementById('status');
const audioPlayer = document.getElementById('audioPlayer');
const audioPlayerEl = document.getElementById('audioPlayerEl');
const charCount = document.getElementById('charCount');
const charLimit = document.getElementById('charLimit');
const tokenBtn = document.getElementById('tokenBtn');
const upgradeBtn = document.getElementById('upgradeBtn');
const downloadBtn = document.getElementById('downloadBtn');

let proToken = localStorage.getItem('miaudiofiel_token') || '';
let currentAudioUrl = null;
const MAX_GRATIS = 2500;

// Contador caracteres
textInput.addEventListener('input', () => {
  const chars = textInput.value.length;
  charCount.textContent = chars;
  charLimit.textContent = chars > MAX_GRATIS ? '¡LIMITE EXCEDIDO!' : `${MAX_GRATIS - chars} libres`;
});

// Backend TTS
async function generarAudio() {
  const texto = textInput.value.trim();
  if (!texto) {
    status.innerHTML = '📝 Escribe texto primero';
    return;
  }
  
  if (texto.length > MAX_GRATIS && !proToken) {
    status.innerHTML = '🔒 <strong>PRO</strong> necesario para textos largos';
    upgradeBtn.style.display = 'block';
    return;
  }
  
  playBtn.disabled = true;
  playBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> GENERANDO...';
  status.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Conectando con IA Premium...';
  
  try {
    const response = await fetch('https://miaudiofiel.onrender.com/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text: texto,
        lang: voiceSelect.value.split('-')[0] + '-' + voiceSelect.value.split('-')[1],
        voice: voiceSelect.value,
        token: proToken
      })
    });
    
    if (!response.ok) {
      const error = await response.json();
      throw new Error(error.error || 'Error desconocido');
    }
    
    const audioBlob = await response.blob();
    currentAudioUrl = URL.createObjectURL(audioBlob);
    
    audioPlayerEl.src = currentAudioUrl;
    audioPlayer.style.display = 'block';
    status.innerHTML = '<i class="fas fa-check-circle" style="color: #10b981;"></i> ¡Audio listo! 🎵';
    status.classList.add('status-playing');
    
  } catch (error) {
    status.innerHTML = `❌ ${error.message}`;
    console.error('TTS Error:', error);
  } finally {
    playBtn.disabled = false;
    playBtn.innerHTML = '<i class="fas fa-play"></i> GENERAR AUDIO';
  }
}

// Token PRO
tokenBtn.onclick = () => {
  const token = prompt('Ingresa tu token PRO:');
  if (token) {
    proToken = token;
    localStorage.setItem('miaudiofiel_token', token);
    document.getElementById('planBadge').innerHTML = 
      '<i class="fas fa-crown" style="color: gold;"></i> <span>PLAN PRO</span>';
  }
};

// Eventos
playBtn.onclick = generarAudio;
upgradeBtn.onclick = () => {
  window.open('https://t.me/miaudiofiel_bot', '_blank');
};

// Inicializar
document.addEventListener('DOMContentLoaded', () => {
  if (proToken) {
    document.getElementById('planBadge').innerHTML = 
      '<i class="fas fa-crown" style="color: gold;"></i> <span>PLAN PRO</span>';
  }
});
</script>
</body>
</html>
