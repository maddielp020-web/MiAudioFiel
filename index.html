<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>MiAudioFiel · TTS Premium</title>
  
  <!-- PWA Icons -->
  <link rel="apple-touch-icon" href="data:image/svg+xml;base64,...">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a1428">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/colores.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/componentes.css">
  <link rel="stylesheet" href="css/modos.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">MiAudioFiel</div>
      <div class="subtitle">Texto a Voz Premium</div>
      <div class="plan-badge" id="planBadge">
        <i class="fas fa-crown"></i>
        <span>PLAN GRATIS</span>
        <span id="charsLeft">2,500 / día</span>
      </div>
    </div>

    <!-- Text Input Card -->
    <div class="liquid-card">
      <div class="card-header">
        <i class="fas fa-microphone"></i>
        <h2>Texto a narrar</h2>
      </div>
      
      <textarea 
        class="textarea-liquid" 
        id="textInput" 
        placeholder="Escribe o pega tu texto aquí... Máximo 2.500 caracteres (GRATIS)"
      ></textarea>
      
      <div class="char-counter">
        <span><i class="fas fa-hashtag"></i> <span id="charCount">0</span> caracteres</span>
        <div class="char-limit" id="charLimit">2,500 / día</div>
      </div>
    </div>

    <!-- Controls Card -->
    <div class="liquid-card controls-liquid">
      <div class="controls-header">
        <i class="fas fa-sliders-h"></i>
        <label>Configuración Premium</label>
      </div>
      
      <div class="controls-grid">
        <div class="control-group">
          <label>Voz</label>
          <select class="select-liquid" id="voiceSelect">
            <option value="es-ES-ElviraNeural">🇪🇸 Elvira (Español España)</option>
            <option value="es-ES-AlvaroNeural">🇪🇸 Álvaro (Español Hombre)</option>
            <option value="es-MX-PaulinaNeural">🇲🇽 Paulina (Español México)</option>
            <option value="en-US-AriaNeural">🇺🇸 Aria (Inglés)</option>
            <option value="ru-RU-SvetlanaNeural">🇷🇺 Svetlana (Ruso)</option>
          </select>
        </div>
        
        <div class="control-group">
          <label>Velocidad</label>
          <div class="radio-group">
            <label><input type="radio" name="speed" value="0" checked> Normal</label>
            <label><input type="radio" name="speed" value="-20%"> Lento</label>
            <label><input type="radio" name="speed" value="20%"> Rápido</label>
          </div>
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="button-group">
      <button class="btn-liquid btn-liquid-primary" id="playBtn">
        <i class="fas fa-play"></i> GENERAR AUDIO
      </button>
      <div class="button-row">
        <button class="btn-liquid btn-liquid-secondary" id="tokenBtn">
          <i class="fas fa-key"></i> TOKEN PRO
        </button>
        <button class="btn-liquid btn-liquid-secondary" id="upgradeBtn">
          <i class="fas fa-crown"></i> IR PRO
        </button>
      </div>
    </div>

    <!-- Status -->
    <div class="status-liquid" id="status">
      <i class="fas fa-circle-notch fa-spin"></i> Listo para generar audio premium
    </div>

    <!-- Audio Player -->
    <div class="liquid-card" id="audioPlayer" style="display: none;">
      <audio id="audioPlayerEl" controls></audio>
      <button class="btn-liquid btn-liquid-secondary" id="downloadBtn">
        <i class="fas fa-download"></i> DESCARGAR MP3
      </button>
    </div>
  </div>

  <!-- JavaScript -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
